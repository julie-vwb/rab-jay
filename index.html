    html, body {

<script>
    const CATEGORIES = {
        income: [
            { name: 'เงินเดือน', emoji: '💼', id: 'salary' },
            { name: 'โบนัส', emoji: '🎁', id: 'bonus' },
            { name: 'ฟรีแลนซ์', emoji: '💻', id: 'freelance' },
            { name: 'ขายของ', emoji: '📦', id: 'sell' },
            { name: 'ลดหนี้', emoji: '💸', id: 'refund' },
            { name: 'อื่นๆ', emoji: '🌟', id: 'other_income' }
        ],
        expense: [
            { name: 'อาหาร', emoji: '🍜', id: 'food' },
            { name: 'กาแฟ', emoji: '☕', id: 'coffee' },
            { name: 'ขนส่ง', emoji: '🚗', id: 'transport' },
            { name: 'ช้อปปิ้ง', emoji: '🛍️', id: 'shopping' },
            { name: 'ความบันเทิง', emoji: '🎬', id: 'entertainment' },
            { name: 'สุขภาพ', emoji: '💊', id: 'health' },
            { name: 'ค่าเช่า', emoji: '🏠', id: 'rent' },
            { name: 'น้ำไฟ', emoji: '⚡', id: 'utilities' },
            { name: 'ศึกษา', emoji: '📚', id: 'education' },
            { name: 'เกม', emoji: '🎮', id: 'games' },
            { name: 'ซ่อม', emoji: '🔧', id: 'repair' },
            { name: 'อื่นๆ', emoji: '❓', id: 'other_expense' }
        ]
    };

    const QUICK_AMOUNTS = [50, 100, 500, 1000, 2000, 5000];

    let transactions = [];
    let currentType = 'income';
    let selectedCategory = null;

    function init() {
        loadData();
        renderCategories();
        renderQuickAmounts();
        document.getElementById('date').valueAsDate = new Date();
        updateUI();
    }

    function loadData() {
        const saved = localStorage.getItem('transactions');
        if (saved) {
            try {
                transactions = JSON.parse(saved);
            } catch (e) {
                transactions = [];
            }
        }
    }

    function saveData() {
        localStorage.setItem('transactions', JSON.stringify(transactions));
        updateUI();
    }

    function switchType(type) {
        currentType = type;
        selectedCategory = null;
        
        document.querySelectorAll('.toggle-btn').forEach(btn => {
            btn.classList.remove('active');
        });
        event.target.classList.add('active');

        renderCategories();
        renderQuickAmounts();
    }

    function renderCategories() {
        const grid = document.getElementById('categoryGrid');
        const cats = CATEGORIES[currentType];
        grid.innerHTML = cats.map(cat => `
            <button class="category-btn" onclick="selectCategory('${cat.id}', this)">
                <span class="emoji">${cat.emoji}</span>
                <span>${cat.name}</span>
            </button>
        `).join('');
    }

    function selectCategory(id, btn) {
        selectedCategory = id;
        document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function renderQuickAmounts() {
        const grid = document.getElementById('quickAmountGrid');
        grid.innerHTML = QUICK_AMOUNTS.map(amount => `
            <button class="quick-amount-btn" onclick="quickAmount(${amount})">฿${amount}</button>
        `).join('');
    }

    function quickAmount(amount) {
        document.getElementById('amount').value = amount;
    }

    function addTransaction() {
        const description = document.getElementById('description').value.trim();
        const amount = parseFloat(document.getElementById('amount').value);
        const date = document.getElementById('date').value;

        if (!amount || amount <= 0) {
            alert('⚠️ กรุณากรอกจำนวนเงินนะค้าบ');
            return;
        }

        if (!selectedCategory) {
            alert('⚠️ กรุณาเลือกหมวดหมู่นะค้าบ');
            return;
        }

        if (!date) {
            alert('⚠️ กรุณาเลือกวันที่นะค้าบ');
            return;
        }

        const categoryName = CATEGORIES[currentType].find(c => c.id === selectedCategory)?.name || 'อื่นๆ';
        const categoryEmoji = CATEGORIES[currentType].find(c => c.id === selectedCategory)?.emoji || '❓';

        transactions.unshift({
            id: Date.now(),
            type: currentType,
            description: description || categoryName,
            emoji: categoryEmoji,
            amount,
            date,
            category: selectedCategory
        });

        document.getElementById('description').value = '';
        document.getElementById('amount').value = '';
        document.getElementById('date').valueAsDate = new Date();
        selectedCategory = null;
        renderCategories();

        saveData();
    }

    function deleteTransaction(id) {
        if (confirm('ลบรายการนี้จริงๆ? 😢')) {
            transactions = transactions.filter(t => t.id !== id);
            saveData();
        }
    }

    function clearAllData() {
        if (confirm('⚠️ ล้างข้อมูลทั้งหมด? จะไม่สามารถกู้คืนได้นะค้าบ 😭')) {
            transactions = [];
            localStorage.removeItem('transactions');
            updateUI();
        }
    }

    function updateUI() {
        updateSummary();
        renderTransactions();
    }

    function updateSummary() {
        const income = transactions
            .filter(t => t.type === 'income')
            .reduce((sum, t) => sum + t.amount, 0);

        const expense = transactions
            .filter(t => t.type === 'expense')
            .reduce((sum, t) => sum + t.amount, 0);

        const balance = income - expense;

        document.getElementById('totalIncome').textContent = `฿${income.toLocaleString('th-TH')}`;
        document.getElementById('totalExpense').textContent = `฿${expense.toLocaleString('th-TH')}`;
        document.getElementById('totalBalance').textContent = `฿${balance.toLocaleString('th-TH')}`;
    }

    function renderTransactions() {
        const list = document.getElementById('transactionsList');

        if (transactions.length === 0) {
            list.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-emoji">🎀</div>
                    <p>ยังไม่มีรายการค้าบ เริ่มบันทึกเงินกันเลย!</p>
                </div>
            `;
            return;
        }

        list.innerHTML = transactions.map(t => {
            const dateObj = new Date(t.date);
            const dateStr = dateObj.toLocaleDateString('th-TH', { 
                year: '2-digit', 
                month: 'short', 
                day: '2-digit' 
            });

            return `
                <div class="transaction-item ${t.type}">
                    <div class="transaction-left">
                        <div class="transaction-emoji">${t.emoji}</div>
                        <div class="transaction-info">
                            <h4>${t.description}</h4>
                            <p>${dateStr}</p>
                        </div>
                    </div>
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <div class="transaction-amount ${t.type}">
                            ${t.type === 'income' ? '+' : '-'}฿${t.amount.toFixed(2)}
                        </div>
                        <button class="btn-delete" onclick="deleteTransaction(${t.id})">✕</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function exportCSV() {
        if (transactions.length === 0) {
            alert('⚠️ ไม่มีข้อมูลให้ส่งออก');
            return;
        }

        const headers = ['ประเภท', 'รายละเอียด', 'จำนวน', 'วันที่', 'หมวดหมู่'];
        const rows = transactions.map(t => [
            t.type === 'income' ? 'รายรับ' : 'รายจ่าย',
            t.description,
            t.amount,
            t.date,
            t.category
        ]);

        let csv = headers.join(',') + '\n';
        rows.forEach(row => {
            csv += row.map(cell => `"${cell}"`).join(',') + '\n';
        });

        const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `เงินน้อยน้อย-${new Date().toISOString().split('T')[0]}.csv`;
        link.click();
    }

    init();
</script>
