                                            {new Date(order.lastUpdate).toLocaleDateString('th-TH')}
                                        </p>
                                    </div>

                                    {/* Action Buttons */}
                                    <div className="flex gap-2">
                                        <button
                                            onClick={() => setEditingOrder(order)}
                                            className="flex-1 bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded font-semibold text-sm flex items-center justify-center gap-1 transition duration-200"
                                        >
                                            <EditIcon />
                                            แก้ไข
                                        </button>
                                        <button
                                            onClick={() => handleDeleteOrder(order.id)}
                                            className="flex-1 bg-red-600 hover:bg-red-700 px-4 py-2 rounded font-semibold text-sm flex items-center justify-center gap-1 transition duration-200"
                                        >
                                            <TrashIcon />
                                            ลบ
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* Edit Modal */}
                        {editingOrder && (
                            <div className="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center p-4 z-50">
                                <div className="bg-slate-800 rounded-lg border border-slate-700 max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                                    <OrderForm
                                        order={editingOrder}
                                        statusLabels={statusLabels}
                                        onSave={handleSaveOrder}
                                        onCancel={() => setEditingOrder(null)}
                                    />
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }
    };

            email: '',
            lineId: '',
            facebookName: '',

                    <div>

                        <input
                            type="text"

                            className="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                        />
                    </div>
                    <div>
                        <label className="block text-sm font-semibold text-slate-300 mb-2">เบอร์โทรศัพท์</label>
                        <input
                            type="text"

                        />

                    <textarea

                        className="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded text-white focus:outline-none focus:ring-2 focus:ring-blue-500 h-24"
                    />

                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">

    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<OrderQueueSystem />);
</script>
